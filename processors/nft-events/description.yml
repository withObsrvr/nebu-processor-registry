processor:
  name: nft-events
  type: origin
  description: Extract NFT-like contract events and calls from Stellar ledgers
  version: 0.1.0
  language: Go
  license: MIT
  maintainers:
    - withObsrvr

repo:
  github: withObsrvr/nebu-processor-registry
  ref: main

proto:
  source: github.com/withObsrvr/nebu-processor-registry/processors/nft-events
  package: nft_events

schema:
  version: v1
  identifier: nebu.nft_events.v1
  documentation: https://github.com/withObsrvr/nebu-processor-registry/blob/main/processors/nft-events/README.md

docs:
  quick_start: |
    nebu install nft-events

    # bounded range
    nft-events --start-ledger 60200000 --end-ledger 60200100

    # from stdin
    nebu fetch 60200000 60200100 | nft-events

  examples: |
    # inspect candidate NFT activity
    nft-events --start-ledger 60200000 --end-ledger 60200100 | jq

    # filter likely SEP-50 contracts
    nft-events --start-ledger 60200000 --end-ledger 60200100 | \
      jq 'select(.standard == "sep_50")'

    # collection-specific activity once you know the contract id
    nft-events --start-ledger 60200000 --end-ledger 60200100 | \
      jq 'select(.contractId == "CA...")'

  extended_description: |
    nft-events is a scaffolded origin processor for NFT indexing workflows.

    It currently emits normalized NFT-like facts derived from:
    - Soroban contract events
    - InvokeContract calls
    - contract-data state changes

    The current version is intentionally heuristic-first. It looks for NFT-like
    method names, event topics, and contract-state patterns such as transfer,
    mint, burn, approve, approve_for_all, owner_of, token_uri, name, and symbol,
    then emits a normalized event with contract id, token id, participants, and
    classification metadata.

    This is intended to be the first layer for a larger NFT gateway/indexer.
    Downstream sinks or services can materialize collection pages, ownership,
    provenance, metadata resolution, and analytics.

    Planned next steps:
    - code-hash / wasm-hash OpenZeppelin detection
    - TTL/health facts
    - richer token/collection metadata extraction
    - better nested state-key decoding
    - tests against known NFT ledgers/contracts
